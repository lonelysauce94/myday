<div id="schedOverlay">
  <div class="sched-card">
    <h3 id="schedTitle"></h3>
    <div class="sub" id="schedSub"></div>
    <div class="sched-row">
      <label for="schedTime">开始</label>
      <input id="schedTime" type="time" step="900">
    </div>
    <div class="sched-row">
      <label for="schedDur">时长</label>
      <select id="schedDur"></select>
    </div>
    <div class="sched-actions">
      <button id="schedUnset" class="unset">取消安排</button>
      <button id="schedCancel">关闭</button>
      <button id="schedOk" class="primary">确定</button>
    </div>
  </div>
</div>

<div id="fsOverlay">
  <div class="fs-card">
    <h3 id="fsOvTitle"></h3>
    <p id="fsOvDesc"></p>
    <div class="fs-actions" id="fsOvActions"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  /* ---------------- state ---------------- */
  const STORE_KEY = 'myday.v1';
  const SNAP = 15; // minutes

  const defaults = { tasks: [], notes: '', journal: {}, reminders: {}, settings: { dayStart: 7, dayEnd: 23 } };
  let state = load();
  let viewDate = todayStr();          // 'YYYY-MM-DD' currently shown on timeline
  let selectedBlockId = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return structuredClone(defaults);
      return normalizeState(JSON.parse(raw));
    } catch { return structuredClone(defaults); }
  }
  function save() {
    state.savedAt = Date.now();
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    scheduleFileWrite();
    scheduleCloudWrite();
  }

  function todayStr(d = new Date()) {
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  }
  function uid() { return Math.random().toString(36).slice(2, 9) + Date.now().toString(36); }
  function fmtTime(min) {
    const p = n => String(n).padStart(2, '0');
    return `${p(Math.floor(min / 60))}:${p(min % 60)}`;
  }

  /* -------- rollover: 昨天没做完的排程任务，收回清单并标"顺延" -------- */
  function rolloverTasks() {
    const today = todayStr();
    let changed = false;
    for (const t of state.tasks) {
      if (t.scheduledDate && t.scheduledDate < today && !t.done) {
        t.scheduledDate = null;
        t.startMin = null;
        t.carried = true;
        changed = true;
      }
    }
    if (changed) save();
  }

  /* -------- migrate: 旧数据没有手动排序字段，按原来的显示顺序补上 -------- */
  function migrateOrder() {
    if (state.tasks.every(t => t.order != null)) return;
    const sorted = [...state.tasks].sort((a, b) =>
      (b.focus - a.focus) || ((b.carried ? 1 : 0) - (a.carried ? 1 : 0)) || (a.createdAt - b.createdAt));
    sorted.forEach((t, i) => { t.order = i; });
    save();
  }

  /* -------- migrate: 旧数据的已完成任务没有完成日期，用排程日期（或今天）补上 -------- */
  function migrateDoneAt() {
    let changed = false;
    for (const t of state.tasks) {
      if (t.done && !t.doneAt) { t.doneAt = t.scheduledDate || todayStr(); changed = true; }
    }
    if (changed) save();
  }

  rolloverTasks();
  migrateOrder();
  migrateDoneAt();
  function nextOrder() {
    return state.tasks.reduce((m, t) => Math.max(m, t.order ?? 0), 0) + 1;
  }

  /* ---------------- header / date nav ---------------- */
  const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  function renderDateLabel() {
    const d = new Date(viewDate + 'T00:00:00');
    const rel = viewDate === todayStr() ? '' :
      (viewDate === todayStr(new Date(Date.now() + 864e5)) ? '（明天）' :
       viewDate === todayStr(new Date(Date.now() - 864e5)) ? '（昨天）' : '');
    document.getElementById('dateLabel').innerHTML =
      `${d.getMonth() + 1}月${d.getDate()}日${rel}<span class="weekday">${WEEKDAYS[d.getDay()]}</span>`;
  }
  function shiftDay(n) {
    const d = new Date(viewDate + 'T00:00:00');
    d.setDate(d.getDate() + n);
    viewDate = todayStr(d);
    closeMenu();
    renderAll();
  }
  document.getElementById('prevDay').onclick = () => shiftDay(-1);
  document.getElementById('nextDay').onclick = () => shiftDay(1);
  document.getElementById('todayBtn').onclick = () => { viewDate = todayStr(); closeMenu(); renderAll(); };

  /* ---------------- day range selects ---------------- */
  const selStart = document.getElementById('dayStart');
  const selEnd = document.getElementById('dayEnd');
  for (let h = 0; h <= 12; h++) selStart.add(new Option(`${h}:00`, h));
  for (let h = 12; h <= 24; h++) selEnd.add(new Option(`${h}:00`, h));
  selStart.value = state.settings.dayStart;
  selEnd.value = state.settings.dayEnd;
  selStart.onchange = () => {
    state.settings.dayStart = +selStart.value;
    if (state.settings.dayEnd <= state.settings.dayStart) {
      state.settings.dayEnd = state.settings.dayStart + 1;
      selEnd.value = state.settings.dayEnd;
    }
    save(); renderAll();
  };
  selEnd.onchange = () => {
    state.settings.dayEnd = +selEnd.value;
    if (state.settings.dayStart >= state.settings.dayEnd) {
      state.settings.dayStart = state.settings.dayEnd - 1;
      selStart.value = state.settings.dayStart;
    }
    save(); renderAll();
  };

  /* ---------------- add task ---------------- */
  const addInput = document.getElementById('addInput');
  function addTask() {
    const title = addInput.value.trim();
    if (!title) return;
    state.tasks.push({
      id: uid(), title, done: false, focus: false,
      scheduledDate: null, startMin: null, durMin: 60,
      carried: false, createdAt: Date.now(), order: nextOrder()
    });
    addInput.value = '';
    save(); renderAll();
  }
  addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('addBtn').onclick = addTask;

  /* ---------------- task ops ---------------- */
  function task(id) { return state.tasks.find(t => t.id === id); }
  function toggleDone(id) {
    const t = task(id); if (!t) return;
    t.done = !t.done;
    if (t.done) t.doneAt = viewDate;   // 记在当前查看的那一天
    else delete t.doneAt;
    save(); renderAll();
  }
  function toggleFocus(id) {
    const t = task(id); if (!t) return;
    if (!t.focus && state.tasks.filter(x => x.focus && !x.done).length >= 3) {
      alert('当前焦点最多 3 件 —— 先完成或取消一件吧。');
      return;
    }
    t.focus = !t.focus; save(); renderAll();
  }
  function removeTask(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    if (selectedBlockId === id) closeMenu();
    save(); renderAll();
  }
  function unschedule(id) {
    const t = task(id); if (!t) return;
    t.scheduledDate = null; t.startMin = null;
    closeMenu(); save(); renderAll();
  }

  /* ---------------- rename ---------------- */
  function startRename(t, span) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'rename-input';
    input.value = t.title;
    span.replaceWith(input);
    input.focus();
    input.select();
    let finished = false;
    const commit = () => {
      if (finished) return;
      finished = true;
      const v = input.value.trim();
      if (v) { t.title = v; save(); }
      renderAll();
    };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { finished = true; renderAll(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('pointerdown', e => e.stopPropagation());
    input.addEventListener('dblclick', e => e.stopPropagation());
  }
  function renameTitleSpan(t, span) {
    span.addEventListener('dblclick', e => {
      e.stopPropagation();
      startRename(t, span);
    });
    span.title = '双击改名';
  }

  /* ---------------- left panel render ---------------- */
  function renderFocus() {
    const list = document.getElementById('focusList');
    list.innerHTML = '';
    // 未完成的焦点一直显示；已完成的只显示在完成的那一天
    const items = state.tasks
      .filter(t => t.focus && (!t.done || t.doneAt === viewDate))
      .sort((a, b) => a.order - b.order);
    if (!items.length) {
      list.innerHTML = '<div class="focus-empty">当下最重要的 1–3 件事是什么？点任务旁的 ★ 选出来。</div>';
      return;
    }
    items.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'focus-item' + (t.done ? ' done' : '');
      el.dataset.id = t.id;
      el.innerHTML = `<span class="focus-num">${i + 1}</span>`;
      el.addEventListener('pointerdown', e => {
        if (e.target.closest('.icon-btn, .check, .rename-input')) return;
        beginDrag(e, t, { offsetPx: 0, sourceEl: el, listEl: list, itemSel: '.focus-item' });
      });
      const chk = makeCheck(t);
      const span = document.createElement('span');
      span.textContent = t.title;
      span.style.flex = '1';
      renameTitleSpan(t, span);
      const un = iconBtn('★', '取消焦点', () => toggleFocus(t.id));
      un.classList.add('star-on');
      el.append(chk, span, un);
      list.appendChild(el);
    });
  }

  function makeCheck(t) {
    const chk = document.createElement('div');
    chk.className = 'check' + (t.done ? ' on' : '');
    chk.textContent = '✓';
    chk.title = t.done ? '标记未完成' : '标记完成';
    chk.onclick = () => toggleDone(t.id);
    return chk;
  }
  function iconBtn(txt, title, fn) {
    const b = document.createElement('button');
    b.className = 'icon-btn';
    b.textContent = txt;
    b.title = title;
    b.onclick = e => { e.stopPropagation(); fn(); };
    return b;
  }

  let showFuture = false;   // 「未来的事」折叠区是否展开（不持久化，每次打开默认收起）
  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    const pending = state.tasks
      .filter(t => !t.done)
      .sort((a, b) => a.order - b.order);
    // 已排到未来日期的任务收进折叠条，不占用今天的注意力；到了那天自然回来
    const today = todayStr();
    const current = pending.filter(t => !(t.scheduledDate && t.scheduledDate > today));
    const future = pending.filter(t => t.scheduledDate && t.scheduledDate > today);
    for (const t of current) list.appendChild(todoRow(t, list));
    if (future.length) {
      const bar = document.createElement('div');
      bar.className = 'future-bar';
      bar.textContent = `${showFuture ? '▾' : '▸'} 已安排 ${future.length} 件未来的事`;
      bar.title = showFuture ? '收起' : '展开看看（它们到了那天会自动出现）';
      bar.onclick = () => { showFuture = !showFuture; renderTodos(); };
      list.appendChild(bar);
      if (showFuture) for (const t of future) list.appendChild(todoRow(t, list));
    }
  }

  function todoRow(t, list) {
    const el = document.createElement('div');
    el.className = 'todo';
    el.dataset.id = t.id;
    el.addEventListener('pointerdown', e => {
      if (e.target.closest('.icon-btn, .check, .rename-input')) return;
      beginDrag(e, t, { offsetPx: 0, sourceEl: el, listEl: list, itemSel: '.todo' });
    });

    const chk = makeCheck(t);
    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = t.title;
    renameTitleSpan(t, title);
    el.append(chk, title);
    if (t.carried) {
      const tag = document.createElement('span');
      tag.className = 'tag'; tag.textContent = '顺延'; tag.title = '之前没做完，顺延过来的';
      el.appendChild(tag);
    }
    if (t.scheduledDate) {
      const tag = document.createElement('span');
      tag.className = 'tag sched-tag';
      tag.textContent = (t.scheduledDate === todayStr() ? '今天 ' :
                         t.scheduledDate === viewDate ? '' :
                         t.scheduledDate.slice(5).replace('-', '/') + ' ') + fmtTime(t.startMin);
      el.appendChild(tag);
    }
    // 手机上没法把任务拖到时间轴（不在同一个标签页），用弹层选时间代替
    const sched = iconBtn('◷', '排时间', () => openSchedPicker(t));
    sched.classList.add('only-mobile');
    const star = iconBtn('★', t.focus ? '取消焦点' : '设为焦点', () => toggleFocus(t.id));
    if (t.focus) star.classList.add('star-on');
    const del = iconBtn('✕', '删除', () => { if (confirm(`删除「${t.title}」？`)) removeTask(t.id); });
    el.append(sched, star, del);
    return el;
  }

  function renderDone() {
    const doneTasks = state.tasks.filter(t => t.done && t.doneAt === viewDate);
    document.getElementById('doneCount').textContent = doneTasks.length;
    const list = document.getElementById('doneList');
    list.innerHTML = '';
    for (const t of doneTasks) {
      const el = document.createElement('div');
      el.className = 'todo done';
      const chk = makeCheck(t);
      const title = document.createElement('span');
      title.className = 'title';
      title.textContent = t.title;
      renameTitleSpan(t, title);
      el.append(chk, title, iconBtn('✕', '删除', () => removeTask(t.id)));
      list.appendChild(el);
    }
  }
  document.getElementById('doneHeader').onclick = () =>
    document.getElementById('doneList').classList.toggle('open');
  document.getElementById('clearDone').onclick = e => {
    e.stopPropagation();
    if (confirm('删除这一天的已完成记录？（其他天的不受影响）')) {
      state.tasks = state.tasks.filter(t => !(t.done && t.doneAt === viewDate));
      save(); renderAll();
    }
  };

  /* ---------------- timeline ---------------- */
  const timeline = document.getElementById('timeline');
  const hourRows = document.getElementById('hourRows');
  const blocksArea = document.getElementById('blocksArea');
  const ghost = document.getElementById('dropGhost');
  const nowLine = document.getElementById('nowLine');
  let dragDur = 60; // duration of task being dragged, for ghost sizing

  const dayStartMin = () => state.settings.dayStart * 60;
  const dayEndMin = () => state.settings.dayEnd * 60;
  const daySpan = () => dayEndMin() - dayStartMin();
  const minToPct = m => (m - dayStartMin()) / daySpan() * 100;

  function renderHours() {
    hourRows.innerHTML = '';
    for (let h = state.settings.dayStart; h <= state.settings.dayEnd; h++) {
      const row = document.createElement('div');
      row.className = 'hour-row';
      row.style.top = minToPct(h * 60) + '%';
      row.innerHTML = `<span class="hlabel">${h}:00</span>`;
      hourRows.appendChild(row);
      if (h < state.settings.dayEnd) {
        const half = document.createElement('div');
        half.className = 'half-line';
        half.style.top = minToPct(h * 60 + 30) + '%';
        hourRows.appendChild(half);
      }
    }
  }

  function overlapColumns(items) {
    // assign column index to overlapping blocks so they sit side by side
    const sorted = [...items].sort((a, b) => a.startMin - b.startMin || a.durMin - b.durMin);
    const cols = [];
    for (const t of sorted) {
      let c = 0;
      while (cols[c] && cols[c] > t.startMin) c++;
      cols[c] = t.startMin + t.durMin;
      t._col = c;
    }
    const groups = new Map();
    for (const t of sorted) {
      let maxCol = 0;
      for (const o of sorted) {
        if (o.startMin < t.startMin + t.durMin && t.startMin < o.startMin + o.durMin)
          maxCol = Math.max(maxCol, o._col);
      }
      groups.set(t.id, maxCol + 1);
    }
    return groups;
  }

  function renderBlocks() {
    blocksArea.innerHTML = '';
    const items = state.tasks.filter(t => t.scheduledDate === viewDate && t.startMin != null);
    document.getElementById('emptyHint').style.display = items.length ? 'none' : 'flex';
    const totalCols = overlapColumns(items);
    for (const t of items) {
      const el = document.createElement('div');
      el.className = 'block'
        + (t.done ? ' done' : '')
        + (t.focus ? ' focus-block' : '')
        + (t.id === selectedBlockId ? ' selected' : '');
      const n = totalCols.get(t.id) || 1;
      const w = 100 / n;
      el.style.top = minToPct(t.startMin) + '%';
      el.style.height = Math.max(t.durMin / daySpan() * 100, 1.8) + '%';
      el.style.left = (t._col * w) + '%';
      el.style.width = `calc(${w}% - 4px)`;
      el.dataset.id = t.id;
      el.innerHTML = `<span class="b-title">${escapeHtml(t.title)}</span>` +
        `<span class="b-time">${fmtTime(t.startMin)} – ${fmtTime(t.startMin + t.durMin)}</span>`;

      el.addEventListener('pointerdown', e => {
        const r = el.getBoundingClientRect();
        beginDrag(e, t, { offsetPx: e.clientY - r.top, sourceEl: el });
      });
      el.addEventListener('click', e => {
        e.stopPropagation();
        if (justDragged) { justDragged = false; return; }
        openMenu(t.id, el);
      });
      el.addEventListener('dblclick', e => {
        e.stopPropagation();
        renameByPrompt(t.id);
      });

      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.draggable = false;
      handle.addEventListener('pointerdown', e => startResize(e, t));
      el.appendChild(handle);
      blocksArea.appendChild(el);
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ------- resize ------- */
  function startResize(e, t) {
    e.preventDefault();
    e.stopPropagation();
    const rect = blocksArea.getBoundingClientRect();
    const move = ev => {
      const min = dayStartMin() + (ev.clientY - rect.top) / rect.height * daySpan();
      let dur = Math.round((min - t.startMin) / SNAP) * SNAP;
      dur = Math.max(SNAP, Math.min(dur, dayEndMin() - t.startMin));
      if (dur !== t.durMin) { t.durMin = dur; renderBlocks(); }
    };
    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      save(); renderAll();
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  }

  /* 浏览器接管手势时（例如页面开始滚动）只会发 pointercancel，不会发 pointerup，
     各处拖拽的收尾逻辑就永远不执行、监听器也摘不掉。这里补发一次 pointerup 兜底。 */
  document.addEventListener('pointercancel', ev => {
    document.dispatchEvent(new PointerEvent('pointerup', {
      clientX: ev.clientX, clientY: ev.clientY, bubbles: true
    }));
  });

  /* ------- pointer-based drag & drop scheduling ------- */
  let justDragged = false;

  function yToSnappedMin(clientY) {
    const rect = blocksArea.getBoundingClientRect();
    const raw = dayStartMin() + (clientY - rect.top) / rect.height * daySpan();
    let m = Math.round(raw / SNAP) * SNAP;
    return Math.max(dayStartMin(), Math.min(m, dayEndMin() - SNAP));
  }
  function overTimeline(x, y) {
    const r = timeline.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  function showGhostAt(clientY) {
    const start = yToSnappedMin(clientY);
    const dur = Math.min(dragDur, dayEndMin() - start);
    ghost.style.display = 'block';
    ghost.style.top = minToPct(start) + '%';
    ghost.style.height = (dur / daySpan() * 100) + '%';
  }
  function hideGhost() { ghost.style.display = 'none'; }

  /* 列表内排序的插入指示线 */
  const dropIndicator = document.createElement('div');
  dropIndicator.id = 'dropIndicator';
  function overRect(x, y, el) {
    const r = el.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  // 返回应插入到哪个元素之前（null = 末尾），排除正在拖的那个
  function listDropTarget(listEl, itemSel, clientY, dragId) {
    const items = [...listEl.querySelectorAll(itemSel)].filter(el => el.dataset.id !== dragId);
    for (const el of items) {
      const r = el.getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return el;
    }
    return null;
  }
  function applyReorder(t, listEl, itemSel, beforeEl) {
    const items = [...listEl.querySelectorAll(itemSel)].filter(el => el.dataset.id !== t.id);
    const idx = beforeEl ? items.indexOf(beforeEl) : items.length;
    const prev = idx > 0 ? task(items[idx - 1].dataset.id) : null;
    const next = idx < items.length ? task(items[idx].dataset.id) : null;
    // 在全局顺序里重新插入并整体重编号，避免 order 出现并列
    const all = state.tasks.filter(x => x.id !== t.id).sort((a, b) => a.order - b.order);
    let insertIdx;
    if (next) insertIdx = all.indexOf(next);
    else if (prev) insertIdx = all.indexOf(prev) + 1;
    else insertIdx = all.length;
    all.splice(insertIdx, 0, t);
    all.forEach((x, i) => { x.order = i; });
    save(); renderAll();
  }

  function beginDrag(e, t, opts) {
    if (e.button !== 0) return;
    // 触摸时，清单里的条目不参与拖拽：手指在列表上滑动应该是滚动。
    // （手机上排时间走任务条的「◷」弹层，时间轴里的块照常可拖）
    if (e.pointerType && e.pointerType !== 'mouse' && opts.listEl) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const offsetPx = opts.offsetPx || 0;
    let dragging = false;
    let pill = null;
    let overList = false;   // 当前是否悬停在来源列表上（排序模式）

    const move = ev => {
      if (!dragging) {
        if (Math.hypot(ev.clientX - startX, ev.clientY - startY) < 5) return;
        dragging = true;
        dragDur = t.durMin || 60;
        closeMenu();
        document.body.classList.add('is-dragging');
        if (opts.sourceEl) opts.sourceEl.classList.add('dragging');
        pill = document.createElement('div');
        pill.id = 'dragPill';
        pill.textContent = t.title;
        document.body.appendChild(pill);
      }
      pill.style.left = (ev.clientX + 12) + 'px';
      pill.style.top = (ev.clientY + 10) + 'px';
      overList = false;
      if (overTimeline(ev.clientX, ev.clientY)) {
        showGhostAt(ev.clientY - offsetPx);
        dropIndicator.remove();
      } else {
        hideGhost();
        if (opts.listEl && overRect(ev.clientX, ev.clientY, opts.listEl)) {
          overList = true;
          const before = listDropTarget(opts.listEl, opts.itemSel, ev.clientY, t.id);
          if (before) opts.listEl.insertBefore(dropIndicator, before);
          else opts.listEl.appendChild(dropIndicator);
        } else {
          dropIndicator.remove();
        }
      }
    };
    const up = ev => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      if (!dragging) return;
      justDragged = true;
      setTimeout(() => { justDragged = false; }, 0);
      document.body.classList.remove('is-dragging');
      if (pill) pill.remove();
      hideGhost();
      dropIndicator.remove();
      if (opts.sourceEl) opts.sourceEl.classList.remove('dragging');
      if (overTimeline(ev.clientX, ev.clientY)) {
        t.scheduledDate = viewDate;
        t.startMin = yToSnappedMin(ev.clientY - offsetPx);
        t.durMin = Math.min(t.durMin || 60, dayEndMin() - t.startMin);
        save(); renderAll();
      } else if (overList && opts.listEl) {
        const before = listDropTarget(opts.listEl, opts.itemSel, ev.clientY, t.id);
        applyReorder(t, opts.listEl, opts.itemSel, before);
      }
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  }

  /* ------- 拖拽画块建任务（Google Calendar 式） ------- */
  const editLayer = document.getElementById('editLayer');

  function openBlockEditor(startMin, durMin) {
    closeMenu();
    editLayer.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'block creating';
    el.style.top = minToPct(startMin) + '%';
    el.style.height = Math.max(durMin / daySpan() * 100, 1.8) + '%';
    el.style.left = '0';
    el.style.width = 'calc(100% - 4px)';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'rename-input';
    input.placeholder = '做什么？回车确认，Esc 取消';
    const time = document.createElement('span');
    time.className = 'b-time';
    time.textContent = `${fmtTime(startMin)} – ${fmtTime(startMin + durMin)}`;
    el.append(input, time);
    el.addEventListener('pointerdown', ev => ev.stopPropagation());
    editLayer.appendChild(el);
    input.focus();
    let finished = false;
    const commit = () => {
      if (finished) return;
      finished = true;
      const v = input.value.trim();
      el.remove();
      if (!v) return;
      state.tasks.push({
        id: uid(), title: v, done: false, focus: false,
        scheduledDate: viewDate, startMin, durMin,
        carried: false, createdAt: Date.now(), order: nextOrder()
      });
      save(); renderAll();
    };
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') commit();
      else if (ev.key === 'Escape') { finished = true; el.remove(); }
    });
    input.addEventListener('blur', commit);
  }

  timeline.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('.block, .rem-flag, .rename-input, #railSplit')) return;
    e.preventDefault();
    const startClientY = e.clientY;
    const anchor = yToSnappedMin(startClientY);
    let creating = false;
    const range = clientY => {
      const cur = yToSnappedMin(clientY);
      const a = Math.min(anchor, cur);
      let b = Math.max(anchor, cur);
      if (b === a) b = Math.min(a + 30, dayEndMin());   // 没拖出高度时默认半小时
      return [a, b];
    };
    const move = ev => {
      if (!creating) {
        if (Math.abs(ev.clientY - startClientY) < 5) return;
        creating = true;
        closeMenu();
      }
      const [a, b] = range(ev.clientY);
      ghost.style.display = 'block';
      ghost.style.top = minToPct(a) + '%';
      ghost.style.height = ((b - a) / daySpan() * 100) + '%';
    };
    const up = ev => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      if (!creating) return;
      hideGhost();
      const [a, b] = range(ev.clientY);
      openBlockEditor(a, b - a);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  });

  // 双击空白处也能快建：默认 1 小时，同样是就地输入
  timeline.addEventListener('dblclick', e => {
    if (e.target.closest('.block, .rem-flag, .rename-input, #railSplit')) return;
    const start = yToSnappedMin(e.clientY);
    openBlockEditor(start, Math.min(60, dayEndMin() - start));
  });

  /* ------- block menu ------- */
  const menu = document.getElementById('blockMenu');
  function openMenu(id, blockEl) {
    const t = task(id);
    if (!t) return;
    selectedBlockId = id;
    menu.innerHTML = '';
    const mkBtn = (label, fn, cls) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (cls) b.className = cls;
      b.onclick = ev => { ev.stopPropagation(); fn(); };
      menu.appendChild(b);
    };
    mkBtn(t.done ? '↩ 未完成' : '✓ 完成', () => { toggleDone(id); closeMenu(); });
    const durLabel = document.createElement('span');
    durLabel.className = 'm-dur';
    durLabel.textContent = `${t.durMin >= 60 ? Math.floor(t.durMin / 60) + 'h' : ''}${t.durMin % 60 ? t.durMin % 60 + 'm' : ''}`;
    mkBtn('−30m', () => {
      t.durMin = Math.max(SNAP, t.durMin - 30);
      save(); renderAll(); openMenuReposition(id);
    });
    menu.appendChild(durLabel);
    mkBtn('+30m', () => {
      t.durMin = Math.min(t.durMin + 30, dayEndMin() - t.startMin);
      save(); renderAll(); openMenuReposition(id);
    });
    mkBtn('✎ 改名', () => renameByPrompt(id));
    mkBtn('移回清单', () => unschedule(id));
    mkBtn('删除', () => { if (confirm(`删除「${t.title}」？`)) removeTask(id); }, 'm-danger');

    positionMenu(blockEl);
    menu.classList.add('open');
    renderBlocks();
  }
  function renameByPrompt(id) {
    const t = task(id); if (!t) return;
    const v = prompt('新的名字：', t.title);
    if (v && v.trim()) { t.title = v.trim(); save(); renderAll(); }
  }
  function openMenuReposition(id) {
    const el = blocksArea.querySelector(`.block[data-id="${id}"]`);
    if (el) openMenu(id, el);
  }
  function positionMenu(blockEl) {
    const r = blockEl.getBoundingClientRect();
    menu.style.left = Math.min(r.left, window.innerWidth - 380) + 'px';
    menu.style.top = Math.min(r.bottom + 6, window.innerHeight - 50) + 'px';
  }
  function closeMenu() {
    selectedBlockId = null;
    menu.classList.remove('open');
    renderBlocks();
  }
  document.addEventListener('click', e => {
    if (!menu.contains(e.target) && !e.target.closest('.block')) closeMenu();
  });

  /* ------- 提醒（生日、纪念日、当天要记得的事，跟任务分开） ------- */
  const remBar = document.getElementById('remBar');
  const remMarkers = document.getElementById('remMarkers');
  const remMenu = document.getElementById('remMenu');

  function dayReminders(d = viewDate) { return state.reminders[d] || []; }

  function parseTimeStr(s) {
    const m = s.trim().match(/^(\d{1,2})[:：.](\d{2})$/);
    if (!m || +m[1] > 23 || +m[2] > 59) return null;
    return +m[1] * 60 + +m[2];
  }
  function addReminder() {
    const raw = prompt('这一天要记得什么？\n（开头写时间可定时，如「18:00 带妈妈吃晚餐」，不写就是全天）');
    if (!raw || !raw.trim()) return;
    let text = raw.trim(), time = null;
    const m = raw.match(/^\s*(\d{1,2}[:：.]\d{2})\s+(.+)$/);
    if (m) {
      const t = parseTimeStr(m[1]);
      if (t != null) { time = t; text = m[2].trim(); }
    }
    (state.reminders[viewDate] = state.reminders[viewDate] || []).push({ id: uid(), text, time });
    save(); renderReminders();
  }
  function removeReminder(id) {
    state.reminders[viewDate] = dayReminders().filter(r => r.id !== id);
    if (!state.reminders[viewDate].length) delete state.reminders[viewDate];
    remMenu.classList.remove('open');
    save(); renderReminders();
  }

  function openRemMenu(r, anchorEl) {
    remMenu.innerHTML = '';
    const mk = (label, fn, cls) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (cls) b.className = cls;
      b.onclick = ev => { ev.stopPropagation(); remMenu.classList.remove('open'); fn(); };
      remMenu.appendChild(b);
    };
    mk('✎ 编辑', () => {
      const v = prompt('提醒内容：', r.text);
      if (v && v.trim()) { r.text = v.trim(); save(); renderReminders(); }
    });
    mk(r.time == null ? '⏰ 设时间' : '⏰ 改时间', () => {
      const v = prompt('时间（如 18:00，留空 = 全天）：', r.time == null ? '' : fmtTime(r.time));
      if (v === null) return;
      if (!v.trim()) r.time = null;
      else {
        const t = parseTimeStr(v);
        if (t == null) { alert('时间格式看不懂，试试写成 18:00 这样。'); return; }
        r.time = t;
      }
      save(); renderReminders();
    });
    mk('删除', () => removeReminder(r.id), 'm-danger');
    const rect = anchorEl.getBoundingClientRect();
    remMenu.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px';
    remMenu.style.top = Math.min(rect.bottom + 6, window.innerHeight - 50) + 'px';
    remMenu.classList.add('open');
  }
  document.addEventListener('click', e => {
    if (!remMenu.contains(e.target) && !e.target.closest('.rem-pill, .rem-flag')) remMenu.classList.remove('open');
  });

  /* 拖拽提醒：胶囊拖进时间轴定时；小旗上下拖改时间，拖回顶部栏变全天 */
  const remGhost = document.getElementById('remGhost');
  let remJustDragged = false;
  function showRemGhostAt(clientY) {
    remGhost.style.display = 'block';
    remGhost.style.top = minToPct(yToSnappedMin(clientY)) + '%';
  }
  function hideRemGhost() { remGhost.style.display = 'none'; }

  // 时间轴上方的整条区域（提醒栏一带）都算「全天」落点，不用精准拖到胶囊上
  function overBarZone(x, y) {
    const tr = timeline.getBoundingClientRect();
    const rr = document.getElementById('right').getBoundingClientRect();
    return x >= rr.left && x <= rr.right && y >= rr.top && y < tr.top;
  }

  function beginRemDrag(e, r, sourceEl) {
    if (e.button !== 0) return;
    if (e.target.closest('.rem-x')) return;
    e.preventDefault();
    e.stopPropagation();
    const sx = e.clientX, sy = e.clientY;
    let dragging = false, pill = null;
    const move = ev => {
      if (!dragging) {
        if (Math.hypot(ev.clientX - sx, ev.clientY - sy) < 5) return;
        dragging = true;
        remMenu.classList.remove('open');
        document.body.classList.add('is-dragging');
        sourceEl.classList.add('dragging');
        pill = document.createElement('div');
        pill.id = 'dragPill';
        document.body.appendChild(pill);
      }
      pill.style.left = (ev.clientX + 12) + 'px';
      pill.style.top = (ev.clientY + 10) + 'px';
      if (overTimeline(ev.clientX, ev.clientY)) {
        pill.textContent = `⚑ ${fmtTime(yToSnappedMin(ev.clientY))} ${r.text}`;
        showRemGhostAt(ev.clientY);
      } else {
        pill.textContent = (overBarZone(ev.clientX, ev.clientY) ? '⚑ 全天 ' : '⚑ ') + r.text;
        hideRemGhost();
      }
    };
    const up = ev => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      if (!dragging) return;
      remJustDragged = true;
      setTimeout(() => { remJustDragged = false; }, 0);
      document.body.classList.remove('is-dragging');
      sourceEl.classList.remove('dragging');
      if (pill) pill.remove();
      hideRemGhost();
      if (overTimeline(ev.clientX, ev.clientY)) r.time = yToSnappedMin(ev.clientY);
      else if (overBarZone(ev.clientX, ev.clientY)) r.time = null;
      else return;
      save(); renderReminders();
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  }

  function renderReminders() {
    remBar.innerHTML = '';
    remMarkers.innerHTML = '';
    const items = [...dayReminders()].sort((a, b) =>
      (a.time == null ? -1 : a.time) - (b.time == null ? -1 : b.time));
    const inRange = r => r.time != null && r.time >= dayStartMin() && r.time <= dayEndMin();
    timeline.classList.toggle('has-rail', items.some(inRange));
    for (const r of items) {
      // 显示范围内的定时提醒只在右侧提醒栏出现，顶部栏放全天的（和超出范围的）
      if (inRange(r)) {
        const line = document.createElement('div');
        line.className = 'rem-marker';
        line.style.top = minToPct(r.time) + '%';
        const flag = document.createElement('span');
        flag.className = 'rem-flag';
        const tm = document.createElement('span');
        tm.className = 'rf-time';
        tm.textContent = `⚑ ${fmtTime(r.time)}`;
        const fx = document.createElement('button');
        fx.className = 'rem-x'; fx.textContent = '✕'; fx.title = '删除';
        fx.onclick = e => { e.stopPropagation(); removeReminder(r.id); };
        tm.appendChild(fx);
        const tx = document.createElement('span');
        tx.className = 'rf-text';
        tx.textContent = r.text;
        flag.append(tm, tx);
        flag.title = '点击编辑；上下拖改时间，拖回顶部栏变全天';
        flag.addEventListener('pointerdown', e => beginRemDrag(e, r, flag));
        flag.onclick = e => {
          e.stopPropagation();
          if (remJustDragged) return;
          openRemMenu(r, flag);
        };
        line.appendChild(flag);
        remMarkers.appendChild(line);
        continue;
      }
      const pill = document.createElement('span');
      pill.className = 'rem-pill';
      pill.title = '点击编辑；拖到时间轴可定到具体时间';
      const bell = document.createElement('span');
      bell.className = 'rem-bell'; bell.textContent = '⚑';
      pill.appendChild(bell);
      if (r.time != null) {
        const tm = document.createElement('span');
        tm.className = 'rem-time'; tm.textContent = fmtTime(r.time);
        pill.appendChild(tm);
      }
      const tx = document.createElement('span');
      tx.className = 'rem-text'; tx.textContent = r.text;
      pill.appendChild(tx);
      const x = document.createElement('button');
      x.className = 'rem-x'; x.textContent = '✕'; x.title = '删除';
      x.onclick = e => { e.stopPropagation(); removeReminder(r.id); };
      pill.appendChild(x);
      pill.addEventListener('pointerdown', e => beginRemDrag(e, r, pill));
      pill.onclick = e => {
        e.stopPropagation();
        if (remJustDragged) return;
        openRemMenu(r, pill);
      };
      remBar.appendChild(pill);
    }
    const add = document.createElement('button');
    add.id = 'remAdd';
    add.textContent = items.length ? '＋ 提醒' : '⚑ 添加提醒（生日、纪念日、要记得的事）';
    add.onclick = e => { e.stopPropagation(); addReminder(); };
    remBar.appendChild(add);
  }

  /* ------- notes ------- */
  const notesArea = document.getElementById('notesArea');
  notesArea.value = state.notes || '';
  notesArea.addEventListener('input', () => {
    state.notes = notesArea.value;
    save();
  });

  /* ------- 今日总结（每天独立一篇） ------- */
  const journalArea = document.getElementById('journalArea');
  const journalTitle = document.getElementById('journalTitle');
  journalArea.addEventListener('input', () => {
    if (journalArea.value.trim()) state.journal[viewDate] = journalArea.value;
    else delete state.journal[viewDate];
    save();
  });
  function renderJournal() {
    const d = new Date(viewDate + 'T00:00:00');
    journalTitle.textContent = viewDate === todayStr()
      ? '✦ 今日总结'
      : `✦ ${d.getMonth() + 1}月${d.getDate()}日总结`;
    if (document.activeElement !== journalArea)
      journalArea.value = state.journal[viewDate] || '';
  }

  /* ---------------- 界面偏好：面板宽度（存本机，不进数据文件） ---------------- */
  const UI_KEY = 'myday.ui';
  let ui = {};
  try { ui = JSON.parse(localStorage.getItem(UI_KEY)) || {}; } catch { ui = {}; }
  function saveUi() { localStorage.setItem(UI_KEY, JSON.stringify(ui)); }

  const leftPanel = document.getElementById('left');
  const notesPanel = document.getElementById('notesPanel');
  if (ui.leftW) leftPanel.style.width = ui.leftW + 'px';
  if (ui.notesW) notesPanel.style.width = ui.notesW + 'px';
  function initSplitter(handleId, el, growDir, min, max, key) {
    const handle = document.getElementById(handleId);
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      const startX = e.clientX, startW = el.getBoundingClientRect().width;
      handle.classList.add('active');
      document.body.style.cursor = 'col-resize';
      const move = ev => {
        const delta = ev.clientX - startX;
        const w = growDir === 'right' ? startW + delta : startW - delta;
        el.style.width = Math.max(min, Math.min(max, w)) + 'px';
      };
      const up = () => {
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        handle.classList.remove('active');
        document.body.style.cursor = '';
        ui[key] = Math.round(el.getBoundingClientRect().width);
        saveUi();
      };
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });
  }
  initSplitter('splitLeft', leftPanel, 'right', 240, 560, 'leftW');
  initSplitter('splitNotes', notesPanel, 'left', 180, 480, 'notesW');

  /* 提醒栏宽度：拖左缘调整，同样只存本机 */
  const railSplit = document.getElementById('railSplit');
  function setRailW(w) {
    w = Math.max(140, Math.min(460, Math.round(w)));
    timeline.style.setProperty('--rail-w', w + 'px');
    return w;
  }
  if (ui.railW) setRailW(ui.railW);
  railSplit.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startW = document.getElementById('remRail').getBoundingClientRect().width;
    let w = startW;
    railSplit.classList.add('active');
    document.body.style.cursor = 'col-resize';
    const move = ev => { w = setRailW(startW - (ev.clientX - startX)); };
    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      railSplit.classList.remove('active');
      document.body.style.cursor = '';
      ui.railW = w;
      saveUi();
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  });

  /* ---------------- 数据文件（Edge / Chrome 共用一份数据） ---------------- */
  const FS_SUPPORTED = 'showSaveFilePicker' in window && 'showOpenFilePicker' in window;
  let fileHandle = null;
  let fileMtime = 0;
  let fsState = 'none';        // none | prompt | on
  let writeTimer = null;
  let writing = false;
  let writeQueued = false;

  function idbOpen() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('myday-fs', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('kv');
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function idbGet(key) {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const g = db.transaction('kv').objectStore('kv').get(key);
      g.onsuccess = () => { res(g.result); db.close(); };
      g.onerror = () => { rej(g.error); db.close(); };
    });
  }
  async function idbSet(key, val) {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(val, key);
      tx.oncomplete = () => { res(); db.close(); };
      tx.onerror = () => { rej(tx.error); db.close(); };
    });
  }
  async function idbDel(key) {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').delete(key);
      tx.oncomplete = () => { res(); db.close(); };
      tx.onerror = () => { rej(tx.error); db.close(); };
    });
  }

  function normalizeState(s) {
    s = (s && typeof s === 'object') ? s : {};
    s.settings = Object.assign({}, defaults.settings, s.settings);
    s.tasks = Array.isArray(s.tasks) ? s.tasks : [];
    s.notes = typeof s.notes === 'string' ? s.notes : '';
    s.journal = (s.journal && typeof s.journal === 'object') ? s.journal : {};
    s.reminders = (s.reminders && typeof s.reminders === 'object') ? s.reminders : {};
    return s;
  }
  // 合并两份数据：savedAt 新的一方为基底，另一方独有的任务/日记补进来，谁的都不丢
  function mergeStates(a, b) {
    a = normalizeState(a); b = normalizeState(b);
    const [base, other] = (b.savedAt || 0) >= (a.savedAt || 0) ? [b, a] : [a, b];
    const merged = normalizeState(JSON.parse(JSON.stringify(base)));
    const ids = new Set(merged.tasks.map(t => t.id));
    for (const t of other.tasks) if (!ids.has(t.id)) merged.tasks.push(t);
    merged.journal = Object.assign({}, other.journal, merged.journal);
    for (const [d, arr] of Object.entries(other.reminders)) {
      if (!Array.isArray(arr)) continue;
      const cur = merged.reminders[d] || (merged.reminders[d] = []);
      const rids = new Set(cur.map(r => r.id));
      for (const r of arr) if (!rids.has(r.id)) cur.push(r);
    }
    if (!merged.notes.trim()) merged.notes = other.notes;
    else if (other.notes.trim() && other.notes !== merged.notes)
      merged.notes = merged.notes + '\n────────\n' + other.notes;
    return merged;
  }
  // 用另一份数据整体替换当前数据（来自文件或导入），并刷新界面
  function adoptState(s) {
    state = normalizeState(s);
    rolloverTasks();
    migrateOrder();
    migrateDoneAt();
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    selStart.value = state.settings.dayStart;
    selEnd.value = state.settings.dayEnd;
    notesArea.value = state.notes || '';
    closeMenu();
    renderAll();
  }

  // 返回值：对象 = 文件里的数据；null = 空文件；undefined = 内容损坏
  async function readFileState() {
    const f = await fileHandle.getFile();
    fileMtime = f.lastModified;
    const text = await f.text();
    if (!text.trim()) return null;
    try { return JSON.parse(text); } catch { return undefined; }
  }
  async function writeFileNow() {
    if (!fileHandle || fsState !== 'on') return;
    if (writing) { writeQueued = true; return; }
    writing = true;
    try {
      const w = await fileHandle.createWritable();
      await w.write(JSON.stringify(state, null, 2));
      await w.close();
      fileMtime = (await fileHandle.getFile()).lastModified;
    } catch (e) {
      console.warn('写入数据文件失败：', e);
    } finally {
      writing = false;
      if (writeQueued) { writeQueued = false; writeFileNow(); }
    }
  }
  function scheduleFileWrite() {
    if (fsState !== 'on') return;
    clearTimeout(writeTimer);
    writeTimer = setTimeout(writeFileNow, 400);
  }

  // savedAt 新的一方说了算：文件更新就采用文件，本机更新就写回文件
  async function syncFromFile() {
    let s;
    try { s = await readFileState(); } catch (e) { console.warn('读取数据文件失败：', e); return; }
    if (s === null || s === undefined) { await writeFileNow(); return; }
    if ((s.savedAt || 0) > (state.savedAt || 0)) adoptState(s);
    else if ((state.savedAt || 0) > (s.savedAt || 0)) await writeFileNow();
  }
  async function checkExternalChange() {
    if (fsState !== 'on' || !fileHandle || writing) return;
    try {
      const f = await fileHandle.getFile();
      if (f.lastModified > fileMtime) await syncFromFile();
    } catch { /* 文件被移动/删除时静默忽略 */ }
  }
  window.addEventListener('focus', checkExternalChange);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) checkExternalChange(); });

  function pickerError(e) {
    if (e && e.name === 'AbortError') return; // 用户取消
    alert('浏览器拒绝了文件访问：' + (e && e.message ? e.message : e));
  }
  async function pickNewFile() {
    try {
      const h = await window.showSaveFilePicker({
        suggestedName: '一日一页-数据.json',
        types: [{ description: 'JSON 数据文件', accept: { 'application/json': ['.json'] } }]
      });
      fileHandle = h; fsState = 'on';
      try { await idbSet('dataFile', h); } catch { /* 记不住也能用，下次重选 */ }
      await writeFileNow();
    } catch (e) { pickerError(e); }
    renderFsChip();
  }
  async function pickExistingFile() {
    try {
      const [h] = await window.showOpenFilePicker({
        types: [{ description: 'JSON 数据文件', accept: { 'application/json': ['.json'] } }]
      });
      if ((await h.requestPermission({ mode: 'readwrite' })) !== 'granted') return;
      fileHandle = h; fsState = 'on';
      const s = await readFileState();
      if (s === undefined) {
        alert('这个文件不是「一日一页」的数据文件。');
        fileHandle = null; fsState = 'none';
        renderFsChip();
        return;
      }
      try { await idbSet('dataFile', h); } catch {}
      if (s === null) await writeFileNow();   // 空文件：把当前数据写进去
      else {
        // 有数据：和本机数据合并（两边的任务都保留），并把合并结果写回文件
        const localHasData = state.tasks.length || state.notes.trim() || Object.keys(state.journal || {}).length;
        adoptState(localHasData ? mergeStates(state, s) : s);
        await writeFileNow();
      }
    } catch (e) { pickerError(e); }
    renderFsChip();
  }
  async function disconnectFile() {
    clearTimeout(writeTimer);
    fileHandle = null; fsState = 'none'; fileMtime = 0;
    try { await idbDel('dataFile'); } catch {}
    renderFsChip();
  }
  async function reconnect() {
    try {
      if ((await fileHandle.requestPermission({ mode: 'readwrite' })) === 'granted') {
        fsState = 'on';
        await syncFromFile();
      }
    } catch (e) { console.warn(e); }
    renderFsChip();
  }
  async function initFileStorage() {
    if (!FS_SUPPORTED) { renderFsChip(); return; }
    try { fileHandle = (await idbGet('dataFile')) || null; } catch { fileHandle = null; }
    if (!fileHandle) { renderFsChip(); return; }
    let p = 'prompt';
    try { p = await fileHandle.queryPermission({ mode: 'readwrite' }); } catch {}
    if (p === 'granted') { fsState = 'on'; await syncFromFile(); }
    else fsState = 'prompt';
    renderFsChip();
  }

  /* ---------------- 云同步（GitHub 私有 Gist，电脑 / iPhone 共用一份） ----------------
     和数据文件走同一套规则：savedAt 新的一方说了算，首次连接时合并，两边任务都不丢。
     断网不报错，改动照常存本机，联网后自动补传。 */
  const CLOUD_KEY = 'myday.cloud';
  const GIST_FILE = 'myday-data.json';
  const GIST_DESC = '一日一页 · 数据（请勿删除）';

  let cloud = { token: '', gistId: '' };
  try { cloud = Object.assign(cloud, JSON.parse(localStorage.getItem(CLOUD_KEY)) || {}); } catch {}
  let cloudState = 'none';      // none | syncing | on | offline | error
  let cloudPulling = false;
  let cloudWriteTimer = null, cloudWriting = false, cloudQueued = false, cloudDirty = false;

  const cloudOn = () => !!(cloud.token && cloud.gistId);
  function saveCloudCfg() { localStorage.setItem(CLOUD_KEY, JSON.stringify(cloud)); }
  // 401/403/404 是配置问题（token 失效、没权限、gist 没了），其余当成网络问题
  const isAuthErr = e => e && (e.status === 401 || e.status === 403 || e.status === 404);

  async function gh(path, opts) {
    const res = await fetch('https://api.github.com' + path, Object.assign({
      headers: {
        'Authorization': 'Bearer ' + cloud.token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    }, opts || {}));
    if (!res.ok) {
      const err = new Error('GitHub ' + res.status);
      err.status = res.status;
      try { err.detail = (await res.json()).message; } catch {}
      throw err;
    }
    return res.json();
  }

  // 返回值：对象 = 云端数据；null = 还没有数据；undefined = 内容损坏
  async function cloudRead() {
    const g = await gh('/gists/' + cloud.gistId);
    const f = g.files && g.files[GIST_FILE];
    if (!f) return null;
    let text = f.content;
    if (f.truncated && f.raw_url) text = await (await fetch(f.raw_url)).text();
    if (!text || !text.trim()) return null;
    try { return JSON.parse(text); } catch { return undefined; }
  }

  async function cloudWriteNow() {
    if (!cloudOn()) return;
    if (cloudWriting) { cloudQueued = true; return; }
    cloudWriting = true;
    setCloudState('syncing');
    try {
      const files = {};
      files[GIST_FILE] = { content: JSON.stringify(state, null, 2) };
      await gh('/gists/' + cloud.gistId, { method: 'PATCH', body: JSON.stringify({ files }) });
      cloudDirty = false;
      setCloudState('on');
    } catch (e) {
      cloudDirty = true;                                   // 记着还欠一次上传
      setCloudState(isAuthErr(e) ? 'error' : 'offline');
      console.warn('云同步写入失败：', e);
    } finally {
      cloudWriting = false;
      if (cloudQueued) { cloudQueued = false; cloudWriteNow(); }
    }
  }
  function scheduleCloudWrite() {
    if (!cloudOn()) return;
    cloudDirty = true;
    clearTimeout(cloudWriteTimer);
    cloudWriteTimer = setTimeout(cloudWriteNow, 1200);     // 网络请求，防抖比本地文件长一些
  }

  async function cloudSync() {
    if (!cloudOn() || cloudPulling) return;
    cloudPulling = true;
    setCloudState('syncing');
    try {
      const s = await cloudRead();
      if (s === undefined) { setCloudState('error'); return; }
      if (s === null) { await cloudWriteNow(); return; }
      if ((s.savedAt || 0) > (state.savedAt || 0)) { adoptState(s); setCloudState('on'); }
      else if ((state.savedAt || 0) > (s.savedAt || 0) || cloudDirty) await cloudWriteNow();
      else setCloudState('on');
    } catch (e) {
      setCloudState(isAuthErr(e) ? 'error' : 'offline');   // 断网只是提示，不打断记事
      console.warn('云同步读取失败：', e);
    } finally {
      cloudPulling = false;
    }
  }

  // 第二台设备贴同一个 token：先在账号里找已有的数据 gist，找不到才新建
  async function cloudFindOrCreate() {
    const list = await gh('/gists?per_page=100');
    const found = list.find(g => g.files && g.files[GIST_FILE]);
    if (found) return found.id;
    const files = {};
    files[GIST_FILE] = { content: JSON.stringify(state, null, 2) };
    const created = await gh('/gists', {
      method: 'POST',
      body: JSON.stringify({ description: GIST_DESC, public: false, files })
    });
    return created.id;
  }

  async function cloudConnect(token, gistId) {
    cloud.token = token.trim();
    cloud.gistId = (gistId || '').trim();
    if (!cloud.gistId) cloud.gistId = await cloudFindOrCreate();
    const s = await cloudRead();
    if (s === undefined) { const e = new Error('bad json'); e.parse = true; throw e; }
    saveCloudCfg();
    if (s === null) { save(); await cloudWriteNow(); return '已在云端建好数据'; }
    const localHasData = state.tasks.length || (state.notes || '').trim() ||
                         Object.keys(state.journal || {}).length;
    adoptState(localHasData ? mergeStates(state, s) : s);
    save();                                                // 合并结果视为最新
    await cloudWriteNow();
    return localHasData ? '已连接，两边数据已合并' : '已连接，拉下了云端数据';
  }

  function cloudDisconnect() {
    clearTimeout(cloudWriteTimer);
    cloud = { token: '', gistId: '' };
    localStorage.removeItem(CLOUD_KEY);
    cloudDirty = false;
    setCloudState('none');
  }

  /* ------- 云同步 chip ------- */
  const cloudChip = document.getElementById('cloudChip');
  const CLOUD_LABEL = {
    none: ['云同步', '把数据同步到你的私有 Gist，电脑和 iPhone 共用一份'],
    syncing: ['⟳ 同步中', '正在和云端同步…'],
    on: ['● 已同步', '数据已同步到云端，点击管理'],
    offline: ['⚠ 待补传', '网络不通，改动已存在本机，联网后会自动补传'],
    error: ['⚠ 同步出错', 'token 失效或没有权限，点一下重新连接']
  };
  function setCloudState(s) { cloudState = s; renderCloudChip(); }
  function renderCloudChip() {
    const [txt, tip] = CLOUD_LABEL[cloudState] || CLOUD_LABEL.none;
    cloudChip.dataset.state = cloudState;
    cloudChip.textContent = txt;
    cloudChip.title = tip;
  }

  /* ------- 连接弹层 ------- */
  const cloudOverlay = document.getElementById('cloudOverlay');
  const cloudMsg = document.getElementById('cloudMsg');
  function openCloudSetup() {
    fsMenu.classList.remove('open');
    document.getElementById('cloudToken').value = cloud.token || '';
    document.getElementById('cloudGistId').value = cloud.gistId || '';
    cloudMsg.textContent = '';
    cloudMsg.className = 'cloud-msg';
    cloudOverlay.classList.add('open');
  }
  function closeCloudSetup() { cloudOverlay.classList.remove('open'); }
  function cloudErrText(e) {
    if (e && e.parse) return '这个 Gist 里的内容不是「一日一页」的数据。';
    if (!e) return '连接失败。';
    if (e.status === 401) return 'token 无效或已过期，请重新生成一个。';
    if (e.status === 403) return '权限不足：生成 token 时要勾上 gist 权限。';
    if (e.status === 404) return '找不到这个 Gist，检查一下 Gist ID。';
    if (e.status) return 'GitHub 返回错误 ' + e.status + (e.detail ? '：' + e.detail : '');
    return '连不上网络，检查网络后再试。';
  }
  document.getElementById('cloudCancel').onclick = closeCloudSetup;
  cloudOverlay.addEventListener('click', e => { if (e.target === cloudOverlay) closeCloudSetup(); });
  document.getElementById('cloudConnect').onclick = async () => {
    const btn = document.getElementById('cloudConnect');
    const token = document.getElementById('cloudToken').value.trim();
    if (!token) {
      cloudMsg.className = 'cloud-msg err';
      cloudMsg.textContent = '请先把 token 贴上来。';
      return;
    }
    btn.disabled = true;
    btn.textContent = '连接中…';
    cloudMsg.className = 'cloud-msg';
    cloudMsg.textContent = '';
    try {
      const msg = await cloudConnect(token, document.getElementById('cloudGistId').value);
      setCloudState('on');
      cloudMsg.className = 'cloud-msg ok';
      cloudMsg.textContent = msg + '。Gist ID：' + cloud.gistId;
      setTimeout(closeCloudSetup, 1800);
    } catch (e) {
      cloudMsg.className = 'cloud-msg err';
      cloudMsg.textContent = cloudErrText(e);
      console.warn('云同步连接失败：', e);
    } finally {
      btn.disabled = false;
      btn.textContent = '连接';
    }
  };

  cloudChip.onclick = e => {
    e.stopPropagation();
    if (!cloudOn() || cloudState === 'error') { openCloudSetup(); return; }
    toggleCloudMenu();
  };
  function toggleCloudMenu() {
    if (fsMenu.classList.contains('open')) { fsMenu.classList.remove('open'); return; }
    fsMenu.innerHTML = '';
    const mk = (label, fn, cls) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (cls) b.className = cls;
      b.onclick = ev => { ev.stopPropagation(); fsMenu.classList.remove('open'); fn(); };
      fsMenu.appendChild(b);
    };
    mk('立即同步', cloudSync);
    mk('重新连接 / 换 token…', openCloudSetup);
    mk('导出备份 (.json)', exportJson);
    mk('导入备份…', () => importInput.click());
    mk('断开云同步（数据留在本机）', cloudDisconnect, 'm-danger');
    const note = document.createElement('div');
    note.className = 'm-note';
    note.textContent = 'Gist ID：' + cloud.gistId + '\n换设备时贴同一个 token 就能自动接上。';
    fsMenu.appendChild(note);
    const r = cloudChip.getBoundingClientRect();
    fsMenu.style.left = Math.min(r.left, window.innerWidth - 260) + 'px';
    fsMenu.style.top = (r.bottom + 6) + 'px';
    fsMenu.classList.add('open');
  }

  // 回到 App / 恢复网络时拉一次；iOS 的 PWA 没有后台同步，这是唯一可靠的时机
  window.addEventListener('focus', () => cloudSync());
  document.addEventListener('visibilitychange', () => { if (!document.hidden) cloudSync(); });
  window.addEventListener('online', () => cloudSync());

  function initCloud() {
    renderCloudChip();
    if (cloudOn()) cloudSync();
  }

  /* ------- 导出 / 导入备份 ------- */
  const importInput = document.getElementById('importFile');
  function exportJson() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `一日一页-备份-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  importInput.onchange = async () => {
    const f = importInput.files[0];
    importInput.value = '';
    if (!f) return;
    try {
      const s = JSON.parse(await f.text());
      if (!confirm('导入会覆盖当前数据，继续？')) return;
      adoptState(s);
      save();
    } catch { alert('这个文件无法解析成数据。'); }
  };

  /* ------- chip 与菜单 ------- */
  const fsChip = document.getElementById('fsChip');
  const fsMenu = document.getElementById('fsMenu');
  function renderFsChip() {
    fsChip.dataset.state = fsState;
    if (fsState === 'on') {
      fsChip.textContent = '● ' + (fileHandle ? fileHandle.name : '已连接');
      fsChip.title = '数据已同步到本地文件，点击管理';
    } else if (fsState === 'prompt') {
      fsChip.textContent = '恢复文件连接';
      fsChip.title = '点一下，恢复对数据文件的访问';
    } else {
      fsChip.textContent = FS_SUPPORTED ? '数据文件' : '备份';
      fsChip.title = FS_SUPPORTED ? '把数据存到本地文件，Edge / Chrome 共用一份' : '导出 / 导入备份';
    }
    renderFsOverlay();
  }
  fsChip.onclick = e => {
    e.stopPropagation();
    if (fsState === 'prompt') { reconnect(); return; }
    toggleFsMenu();
  };
  function toggleFsMenu() {
    if (fsMenu.classList.contains('open')) { fsMenu.classList.remove('open'); return; }
    fsMenu.innerHTML = '';
    const mk = (label, fn, cls) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (cls) b.className = cls;
      b.onclick = ev => { ev.stopPropagation(); fsMenu.classList.remove('open'); fn(); };
      fsMenu.appendChild(b);
    };
    if (FS_SUPPORTED) {
      if (fsState === 'on') {
        mk('打开其他数据文件…', pickExistingFile);
        mk('断开文件（改回仅本机存储）', disconnectFile, 'm-danger');
      } else {
        mk('新建数据文件…', pickNewFile);
        mk('打开已有数据文件…', pickExistingFile);
      }
    }
    mk('导出备份 (.json)', exportJson);
    mk('导入备份…', () => importInput.click());
    if (FS_SUPPORTED && fsState !== 'on') {
      const note = document.createElement('div');
      note.className = 'm-note';
      note.textContent = '新建一次数据文件后，在另一个浏览器里「打开已有数据文件」选同一个文件，两边就共用一份数据。';
      fsMenu.appendChild(note);
    }
    const r = fsChip.getBoundingClientRect();
    fsMenu.style.left = Math.min(r.left, window.innerWidth - 260) + 'px';
    fsMenu.style.top = (r.bottom + 6) + 'px';
    fsMenu.classList.add('open');
  }
  document.addEventListener('click', e => {
    if (!fsMenu.contains(e.target) && e.target !== fsChip && e.target !== cloudChip)
      fsMenu.classList.remove('open');
  });

  /* ------- 启动引导弹层：把每个浏览器都引到同一个数据文件 ------- */
  let overlayDismissed = false;
  const fsOverlay = document.getElementById('fsOverlay');
  function renderFsOverlay() {
    const show = FS_SUPPORTED && !overlayDismissed &&
      (fsState === 'prompt' || (fsState === 'none' && !ui.fsDismissed));
    fsOverlay.classList.toggle('open', show);
    if (!show) return;
    const acts = document.getElementById('fsOvActions');
    acts.innerHTML = '';
    const mk = (label, fn, cls) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (cls) b.className = cls;
      b.onclick = fn;
      acts.appendChild(b);
    };
    if (fsState === 'prompt') {
      document.getElementById('fsOvTitle').textContent = '恢复数据文件连接';
      document.getElementById('fsOvDesc').textContent =
        '浏览器重启后需要重新确认一次文件权限，点一下就能继续同步到「' +
        (fileHandle ? fileHandle.name : '数据文件') + '」。';
      mk('恢复连接', reconnect, 'primary');
      mk('暂不，这次先用本机数据', () => { overlayDismissed = true; renderFsOverlay(); }, 'fs-later');
    } else {
      document.getElementById('fsOvTitle').textContent = '把数据统一到一个文件';
      document.getElementById('fsOvDesc').textContent =
        '这个浏览器还没连接数据文件。连接后，Edge 和 Chrome 共用同一份数据；连接时会自动合并，两边的任务都不会丢。';
      mk('打开已有数据文件…', pickExistingFile, 'primary');
      mk('新建数据文件…', pickNewFile);
      mk('暂不，以后从右上角「数据文件」设置', () => {
        overlayDismissed = true;
        ui.fsDismissed = 1;
        saveUi();
        renderFsOverlay();
      }, 'fs-later');
    }
  }

  /* ------- now line ------- */
  function renderNow() {
    const now = new Date();
    const isToday = viewDate === todayStr();
    const m = now.getHours() * 60 + now.getMinutes();
    if (!isToday || m < dayStartMin() || m > dayEndMin()) {
      nowLine.style.display = 'none';
      return;
    }
    nowLine.style.display = 'block';
    nowLine.style.top = minToPct(m) + '%';
  }
  setInterval(renderNow, 60 * 1000);

  /* ---------------- render all ---------------- */
  function renderAll() {
    renderDateLabel();
    renderFocus();
    renderTodos();
    renderDone();
    renderHours();
    renderBlocks();
    renderReminders();
    renderNow();
    renderJournal();
  }
  /* ---------------- 手机版：底部标签页 ---------------- */
  const tabBar = document.getElementById('tabBar');
  function setTab(name) {
    document.body.dataset.tab = name;
    for (const b of tabBar.querySelectorAll('button'))
      b.setAttribute('aria-selected', b.dataset.tab === name ? 'true' : 'false');
    ui.tab = name;
    saveUi();
  }
  tabBar.addEventListener('click', e => {
    const b = e.target.closest('button');
    if (b) setTab(b.dataset.tab);
  });
  setTab(ui.tab || 'todo');

  /* ------- 排时间弹层：手机上没法把任务拖到时间轴，用它代替 ------- */
  const schedOverlay = document.getElementById('schedOverlay');
  const schedTime = document.getElementById('schedTime');
  const schedDur = document.getElementById('schedDur');
  for (const m of [15, 30, 45, 60, 90, 120, 180]) {
    const o = document.createElement('option');
    o.value = String(m);
    o.textContent = m < 60 ? m + ' 分钟' : (m / 60) + ' 小时';
    schedDur.appendChild(o);
  }
  let schedTaskId = null;

  function defaultStartMin() {
    const now = new Date();
    const m = Math.ceil((now.getHours() * 60 + now.getMinutes()) / SNAP) * SNAP;
    return Math.max(dayStartMin(), Math.min(m, dayEndMin() - SNAP));
  }
  function openSchedPicker(t) {
    schedTaskId = t.id;
    document.getElementById('schedTitle').textContent = t.title;
    document.getElementById('schedSub').textContent = t.scheduledDate
      ? `现在安排在 ${t.scheduledDate} ${fmtTime(t.startMin)}`
      : `安排到 ${viewDate}`;
    const start = (t.scheduledDate && t.startMin != null) ? t.startMin : defaultStartMin();
    schedTime.value = String(Math.floor(start / 60)).padStart(2, '0') + ':' +
                      String(start % 60).padStart(2, '0');
    schedDur.value = String(t.durMin || 60);
    document.getElementById('schedUnset').style.display = t.scheduledDate ? '' : 'none';
    schedOverlay.classList.add('open');
  }
  function closeSched() { schedOverlay.classList.remove('open'); schedTaskId = null; }

  document.getElementById('schedCancel').onclick = closeSched;
  schedOverlay.addEventListener('click', e => { if (e.target === schedOverlay) closeSched(); });
  document.getElementById('schedOk').onclick = () => {
    const t = task(schedTaskId);
    if (!t) { closeSched(); return; }
    const parts = (schedTime.value || '').split(':').map(Number);
    if (parts.length !== 2 || Number.isNaN(parts[0]) || Number.isNaN(parts[1])) { closeSched(); return; }
    const start = Math.max(dayStartMin(), Math.min(parts[0] * 60 + parts[1], dayEndMin() - SNAP));
    t.scheduledDate = viewDate;
    t.startMin = start;
    t.durMin = Math.min(Number(schedDur.value) || 60, dayEndMin() - start);
    save(); renderAll(); closeSched();
  };
  document.getElementById('schedUnset').onclick = () => {
    const t = task(schedTaskId);
    if (t) { t.scheduledDate = null; t.startMin = null; save(); renderAll(); }
    closeSched();
  };

  renderAll();
  renderFsChip();
  initFileStorage();
  initCloud();
})();
</script>

<script>
/* 注册 Service Worker：只在 https / localhost 下生效，file:// 打开时静默跳过 */
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW 注册失败：', e));
  });
}
</script>

</body>
