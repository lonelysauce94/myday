<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>一日一页</title>

<!-- PWA：可安装、全屏、离线 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1eee6">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="一日一页">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root {
    --bg: #f1eee6;
    --panel: #faf9f4;
    --card: #ffffff;
    --ink: #2a2820;
    --ink-soft: #8f897a;
    --ink-faint: #bab4a4;
    --line: #e4e0d3;
    --line-soft: #edeadf;
    --accent: #40745a;
    --accent-deep: #315e47;
    --accent-soft: #e3ece5;
    --focus: #b06f24;
    --focus-deep: #935912;
    --focus-soft: #f7ecd8;
    --focus-line: #e9d6b0;
    --danger: #b5543b;
    --now: #d84a37;
    --block: #e9f0ea;
    --block-border: #c9dbcf;
    --done: #b3ad9e;
    --radius: 10px;
    --shadow-sm: 0 1px 2px rgba(57,50,33,.05);
    --shadow-md: 0 2px 10px rgba(57,50,33,.09);
    --shadow-lg: 0 12px 32px rgba(57,50,33,.16);
    font-size: 15px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent-soft); }
  button, select, input { font-family: inherit; }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    flex: none;
    position: relative;
    z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; }
  header h1::after {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 8px;
    vertical-align: 3px;
  }
  .date-nav {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
  }
  .date-nav button {
    border: none;
    background: transparent;
    border-radius: 999px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1.3;
    color: var(--ink-soft);
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .date-nav button:hover { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
  .date-nav .today-btn { color: var(--accent); font-weight: 600; }
  .date-nav .today-btn:hover { color: var(--accent-deep); }
  #dateLabel { font-size: 1.02rem; font-weight: 600; min-width: 200px; text-align: center; font-variant-numeric: tabular-nums; }
  #dateLabel .weekday { color: var(--ink-soft); font-weight: 400; margin-left: 7px; font-size: 0.88rem; }
  .spacer { flex: 1; }
  .range-ctl { display: flex; align-items: center; gap: 6px; color: var(--ink-soft); font-size: 0.82rem; }
  .range-ctl select {
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 6px;
    background: var(--panel);
    color: var(--ink);
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color .15s;
  }
  .range-ctl select:hover { border-color: var(--ink-faint); }

  /* ---------- layout ---------- */
  main { flex: 1; display: flex; min-height: 0; }

  /* ---------- left panel ---------- */
  #left {
    width: 330px;
    flex: none;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
    background: var(--panel);
    min-height: 0;
  }
  #left section { padding: 14px 16px; }
  #left h2 {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #focusSection {
    border-bottom: 1px solid var(--focus-line);
    background: linear-gradient(180deg, #faf4e6, #f8f0e0);
  }
  #focusSection h2 { color: var(--focus-deep); }
  #focusList { display: flex; flex-direction: column; gap: 7px; }
  .focus-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    background: var(--card);
    border: 1px solid var(--focus-line);
    border-radius: var(--radius);
    font-weight: 500;
    cursor: grab;
    user-select: none;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .focus-item:hover { border-color: #dcbf8b; box-shadow: var(--shadow-md); }
  .focus-item:active { cursor: grabbing; }
  .focus-item.done {
    text-decoration: line-through;
    color: var(--done);
    font-weight: 400;
    background: transparent;
    border-color: var(--line-soft);
    box-shadow: none;
  }
  .focus-empty { color: #a8996f; font-size: 0.84rem; padding: 6px 2px; line-height: 1.55; }
  .focus-num {
    color: #fff;
    background: var(--focus);
    font-weight: 700;
    font-size: 0.72rem;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex: none;
    font-variant-numeric: tabular-nums;
  }
  .focus-item.done .focus-num { background: var(--done); }

  #inboxSection { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #addRow { display: flex; gap: 8px; margin-bottom: 12px; }
  #addInput {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 0.95rem;
    background: var(--card);
    color: var(--ink);
    outline: none;
    box-shadow: inset 0 1px 2px rgba(57,50,33,.04);
    transition: border-color .15s, box-shadow .15s;
  }
  #addInput::placeholder { color: var(--ink-faint); }
  #addInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #addBtn {
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    padding: 0 15px;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: background .15s;
  }
  #addBtn:hover { background: var(--accent-deep); }
  #addBtn:active { transform: translateY(1px); }
  #todoList {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
    padding-right: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  #todoList::-webkit-scrollbar, #doneList::-webkit-scrollbar { width: 8px; }
  #todoList::-webkit-scrollbar-thumb, #doneList::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  #todoList::-webkit-scrollbar-thumb:hover, #doneList::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
  .todo {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    background: var(--card);
    cursor: grab;
    user-select: none;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .todo:hover { border-color: var(--line); box-shadow: var(--shadow-md); }
  .todo:active { cursor: grabbing; }
  .todo.dragging, .focus-item.dragging { opacity: 0.35; }
  #dropIndicator {
    height: 0;
    border-top: 2px solid var(--accent);
    border-radius: 1px;
    margin: -4px 0;
    pointer-events: none;
    position: relative;
  }
  #dropIndicator::before {
    content: "";
    position: absolute;
    left: -1px; top: -4px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .rename-input {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 2px 6px;
    font: inherit;
    color: var(--ink);
    background: var(--card);
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .todo .title { flex: 1; word-break: break-all; line-height: 1.45; }
  .todo.done .title { text-decoration: line-through; color: var(--done); }
  .todo .tag {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--focus-deep);
    background: var(--focus-soft);
    border-radius: 999px;
    padding: 2px 8px;
    flex: none;
    font-variant-numeric: tabular-nums;
  }
  .todo .sched-tag { color: var(--accent-deep); background: var(--accent-soft); }
  .icon-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.95rem;
    color: var(--ink-faint);
    padding: 2px 5px;
    border-radius: 6px;
    flex: none;
    line-height: 1;
    opacity: 0;
    transition: opacity .12s, background .12s, color .12s;
  }
  .todo:hover .icon-btn, .focus-item:hover .icon-btn, .icon-btn.star-on { opacity: 1; }
  .icon-btn:hover { background: var(--bg); color: var(--ink); }
  .icon-btn.star-on { color: var(--focus); }
  .icon-btn.star-on:hover { color: var(--focus-deep); background: var(--focus-soft); }
  .check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--ink-faint);
    border-radius: 6px;
    cursor: pointer;
    flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: transparent;
    background: var(--card);
    transition: background .15s, border-color .15s, color .15s;
  }
  .check:hover { border-color: var(--accent); }
  .check.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .future-bar {
    font-size: 12px;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 6px 8px;
    margin-top: 2px;
    border-radius: 6px;
    user-select: none;
    transition: color .15s, background .15s;
  }
  .future-bar:hover { color: var(--ink); background: var(--card); }

  #doneSection { border-top: 1px solid var(--line); }
  #doneHeader { cursor: pointer; user-select: none; transition: color .15s; }
  #doneHeader:hover { color: var(--ink); }
  #doneHeader .count {
    color: var(--ink-soft);
    font-weight: 600;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 0.7rem;
    letter-spacing: 0;
  }
  #doneList { display: none; flex-direction: column; gap: 4px; max-height: 150px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  #doneList.open { display: flex; }
  #doneList .todo { box-shadow: none; background: transparent; border-color: transparent; }
  #doneList .todo:hover { background: var(--card); border-color: var(--line-soft); }
  #clearDone {
    margin-left: auto;
    font-size: 0.72rem;
    letter-spacing: normal;
    color: var(--ink-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 7px;
    border-radius: 5px;
    transition: color .15s, background .15s;
  }
  #clearDone:hover { color: var(--danger); background: #f6e8e2; }
  .hint { font-size: 0.75rem; color: var(--ink-faint); padding: 10px 2px 0; line-height: 1.6; }

  /* ---------- timeline ---------- */
  #right { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 14px 20px 16px; }
  #timeline {
    flex: 1;
    position: relative;
    min-height: 0;
    border-radius: var(--radius);
  }
  .hour-row {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px solid var(--line);
    display: flex;
  }
  .hour-row .hlabel {
    width: 48px;
    flex: none;
    font-size: 0.7rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink-faint);
    transform: translateY(-55%);
    background: var(--bg);
    padding-right: 10px;
    text-align: right;
  }
  .half-line {
    position: absolute;
    left: 48px; right: 0;
    border-top: 1px dashed var(--line-soft);
  }
  #blocksArea { position: absolute; left: 52px; right: 4px; top: 0; bottom: 0; }
  #nowLine {
    position: absolute;
    left: 40px; right: 0;
    border-top: 2px solid var(--now);
    z-index: 5;
    pointer-events: none;
  }
  #nowLine::before {
    content: "";
    position: absolute;
    left: -5px; top: -5px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--now);
    box-shadow: 0 0 0 3px rgba(216,74,55,.14);
  }
  .block {
    position: absolute;
    left: 0;
    background: linear-gradient(180deg, #eef4ef, #e7efe9);
    border: 1px solid var(--block-border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 3px 9px;
    font-size: 0.85rem;
    overflow: hidden;
    cursor: grab;
    user-select: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 2;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .15s, border-color .15s;
  }
  .block:hover { box-shadow: var(--shadow-md); border-color: #b2c9ba; }
  .block:active { cursor: grabbing; }
  .block.done {
    background: repeating-linear-gradient(-45deg, #f3f2ec 0 5px, #edece5 5px 10px);
    border-color: var(--line);
    border-left-color: var(--done);
    color: var(--done);
    box-shadow: none;
  }
  .block.done .b-title { text-decoration: line-through; font-weight: 400; }
  .block.done .b-time { color: var(--ink-faint); }
  .block.focus-block {
    border-left-color: var(--focus);
    background: linear-gradient(180deg, #f9efdc, #f6ead2);
    border-color: var(--focus-line);
  }
  .block.focus-block:hover { border-color: #dcbf8b; border-left-color: var(--focus); }
  .block.focus-block.done {
    background: repeating-linear-gradient(-45deg, #f3f2ec 0 5px, #edece5 5px 10px);
    border-color: var(--line);
    border-left-color: var(--done);
  }
  .block.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow-md); z-index: 4; }
  .block .b-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block .b-time {
    font-size: 0.68rem;
    color: var(--ink-soft);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .resize-handle {
    position: absolute;
    left: 0; right: 0; bottom: -3px;
    height: 8px;
    cursor: ns-resize;
  }
  #dropGhost {
    position: absolute;
    left: 52px; right: 4px;
    background: rgba(64,116,90,0.12);
    border: 1.5px dashed var(--accent);
    border-radius: 8px;
    display: none;
    pointer-events: none;
    z-index: 3;
  }

  /* ---------- 提醒（跟任务分开的轻量层） ---------- */
  #remBar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin: 0 4px 10px 52px;
    flex: none;
  }
  .rem-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    max-width: 100%;
    background: var(--focus-soft);
    border: 1px dashed var(--focus-line);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.92rem;
    color: var(--focus-deep);
    cursor: grab;
    user-select: none;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, background .15s;
  }
  .rem-pill:hover { border-color: var(--focus); }
  .rem-pill:active { cursor: grabbing; }
  .rem-pill.dragging { opacity: 0.35; }
  .rem-pill .rem-bell { color: var(--focus); font-size: 0.85rem; }
  .rem-pill .rem-time { font-weight: 700; font-variant-numeric: tabular-nums; }
  .rem-pill .rem-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rem-pill .rem-x, .rem-flag .rem-x {
    border: none;
    background: none;
    color: var(--focus-deep);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0 2px;
    line-height: 1;
    border-radius: 4px;
    opacity: 0;
    transition: opacity .12s, color .12s;
  }
  .rem-pill:hover .rem-x { opacity: .55; }
  .rem-pill .rem-x:hover, .rem-flag .rem-x:hover { opacity: 1; color: var(--danger); }
  #remAdd {
    border: none;
    background: none;
    color: var(--ink-faint);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 3px 9px;
    border-radius: 999px;
    transition: color .15s, background .15s;
  }
  #remAdd:hover { color: var(--focus-deep); background: var(--focus-soft); }
  #remMarkers {
    position: absolute;
    left: 52px; right: 4px;
    top: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
  }
  /* 时间轴右侧的提醒栏：任务块让出这一条，小旗永远不会被盖住 */
  #timeline { --rail-w: 196px; }
  #remRail {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: var(--rail-w);
    background: rgba(247, 236, 216, .4);
    border-left: 1px dashed var(--focus-line);
    border-radius: 0 var(--radius) var(--radius) 0;
    display: none;
    z-index: 0;
  }
  #timeline.has-rail #remRail { display: block; }
  #timeline.has-rail #blocksArea { right: calc(var(--rail-w) + 12px); }
  #timeline.has-rail #dropGhost { right: calc(var(--rail-w) + 12px); }
  /* 提醒栏左缘的拖拽把手 */
  #railSplit {
    position: absolute;
    left: -5px; top: 0; bottom: 0;
    width: 10px;
    cursor: col-resize;
    z-index: 6;
  }
  #railSplit::after {
    content: "";
    position: absolute;
    left: 4px; top: 0; bottom: 0;
    width: 3px;
    border-radius: 2px;
    background: transparent;
    transition: background .15s;
  }
  #railSplit:hover::after, #railSplit.active::after { background: var(--focus-line); }
  .rem-marker {
    position: absolute;
    left: 0; right: 0;
    border-top: 2px dashed var(--focus);
    opacity: .85;
  }
  .rem-marker .rem-flag {
    position: absolute;
    right: 2px; top: -14px;
    width: calc(var(--rail-w) - 14px);
    background: linear-gradient(180deg, #fdf6e6, #f8eed7);
    border: 1px solid var(--focus-line);
    border-left: 4px solid var(--focus);
    color: var(--focus-deep);
    border-radius: 8px;
    padding: 6px 10px 7px;
    font-size: 0.88rem;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    gap: 1px;
    pointer-events: auto;
    cursor: grab;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .rem-marker .rem-flag:hover { border-color: var(--focus); box-shadow: var(--shadow-md); }
  .rem-marker .rem-flag:active { cursor: grabbing; }
  .rem-marker .rem-flag.dragging { opacity: 0.35; }
  .rem-flag .rf-time {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.76rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .rem-flag .rf-time .rem-x { margin-left: auto; }
  .rem-flag:hover .rem-x { opacity: .55; }
  .rem-flag .rf-text {
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    word-break: break-all;
  }
  #remGhost {
    position: absolute;
    left: 52px; right: 4px;
    border-top: 2px dashed var(--focus);
    display: none;
    pointer-events: none;
    z-index: 3;
  }

  /* ---------- 拖拽画块建任务 ---------- */
  #editLayer {
    position: absolute;
    left: 52px; right: 4px;
    top: 0; bottom: 0;
    pointer-events: none;
    z-index: 7;
  }
  #timeline.has-rail #editLayer { right: calc(var(--rail-w) + 12px); }
  #editLayer .block { pointer-events: auto; }
  .block.creating {
    cursor: default;
    overflow: visible;
    min-height: 36px;
    gap: 2px;
  }
  .block.creating .rename-input {
    flex: none;
    width: 100%;
    font-size: 0.85rem;
    padding: 3px 7px;
  }

  /* ---------- notes panel ---------- */
  #notesPanel {
    width: 250px;
    flex: none;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--line);
    background: var(--panel);
    padding: 14px 16px;
    min-height: 0;
  }
  #notesPanel h2 {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 10px;
  }
  #notesArea, #journalArea {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    line-height: 1.7;
    min-height: 0;
  }
  #notesArea::placeholder, #journalArea::placeholder { color: var(--ink-faint); }
  .journal-h { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }

  /* ---------- 可拖拽分隔条 ---------- */
  .v-split {
    width: 7px;
    flex: none;
    cursor: col-resize;
    margin: 0 -3px;
    position: relative;
    z-index: 15;
  }
  .v-split::after {
    content: "";
    position: absolute;
    left: 2px; right: 2px; top: 0; bottom: 0;
    background: transparent;
    border-radius: 2px;
    transition: background .15s;
  }
  .v-split:hover::after, .v-split.active::after { background: var(--accent-soft); }

  /* ---------- 数据文件引导弹层 ---------- */
  #fsOverlay {
    position: fixed;
    inset: 0;
    background: rgba(42, 40, 32, .35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #fsOverlay.open { display: flex; }
  .fs-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 26px 28px;
    width: 420px;
    max-width: 92vw;
  }
  .fs-card h3 { font-size: 1.05rem; margin-bottom: 10px; }
  .fs-card p { font-size: .86rem; color: var(--ink-soft); line-height: 1.7; margin-bottom: 18px; }
  .fs-actions { display: flex; flex-direction: column; gap: 8px; }
  .fs-actions button {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: .9rem;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .fs-actions button:hover { border-color: var(--ink-faint); }
  .fs-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .fs-actions button.primary:hover { background: var(--accent-deep); }
  .fs-actions button.fs-later {
    border: none;
    background: none;
    color: var(--ink-faint);
    font-size: .8rem;
    margin-top: 2px;
  }
  .fs-actions button.fs-later:hover { color: var(--ink-soft); }

  /* ---------- block action bar ---------- */
  #blockMenu, #remMenu {
    position: absolute;
    display: none;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    padding: 6px;
    z-index: 20;
    gap: 3px;
    align-items: center;
  }
  #blockMenu.open, #remMenu.open { display: flex; }
  #blockMenu button, #remMenu button {
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--ink);
    white-space: nowrap;
    transition: background .12s;
  }
  #blockMenu button:hover, #remMenu button:hover { background: var(--bg); }
  #blockMenu .m-danger, #remMenu .m-danger { color: var(--danger); }
  #blockMenu .m-danger:hover, #remMenu .m-danger:hover { background: #f6e8e2; }
  #blockMenu .m-dur { color: var(--ink-soft); font-size: 0.78rem; padding: 0 3px; font-variant-numeric: tabular-nums; }

  /* ---------- 数据文件 chip & menu ---------- */
  #cloudChip,
  #fsChip {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 0.8rem;
    color: var(--ink-soft);
    cursor: pointer;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: border-color .15s, color .15s, background .15s;
  }
  #cloudChip:hover, #fsChip:hover { border-color: var(--ink-faint); color: var(--ink); }
  #cloudChip[data-state="on"], #fsChip[data-state="on"] { color: var(--accent-deep); border-color: var(--block-border); background: var(--accent-soft); }
  #cloudChip[data-state="on"]:hover, #fsChip[data-state="on"]:hover { border-color: var(--accent); }
  #cloudChip[data-state="prompt"], #fsChip[data-state="prompt"] { color: var(--focus-deep); border-color: var(--focus-line); background: var(--focus-soft); }
  #cloudChip[data-state="prompt"]:hover, #fsChip[data-state="prompt"]:hover { border-color: var(--focus); }
  /* 云同步特有状态：正在同步 / 离线待补传 */
  #cloudChip[data-state="syncing"] { color: var(--ink-soft); border-color: var(--line); background: var(--panel); }
  #cloudChip[data-state="offline"] { color: var(--focus-deep); border-color: var(--focus-line); background: var(--focus-soft); }
  #cloudChip[data-state="error"] { color: var(--danger); border-color: #e6c3b8; background: #fbeeea; }
  #fsMenu {
    position: fixed;
    display: none;
    flex-direction: column;
    align-items: stretch;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    padding: 6px;
    z-index: 30;
    gap: 2px;
    min-width: 200px;
  }
  #fsMenu.open { display: flex; }
  #fsMenu button {
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--ink);
    text-align: left;
    white-space: nowrap;
    transition: background .12s;
  }
  #fsMenu button:hover { background: var(--bg); }
  #fsMenu .m-danger { color: var(--danger); }
  #fsMenu .m-danger:hover { background: #f6e8e2; }
  #fsMenu .m-note {
    font-size: 0.72rem;
    color: var(--ink-faint);
    padding: 4px 10px 6px;
    border-top: 1px solid var(--line-soft);
    margin-top: 3px;
    white-space: pre-line;
    word-break: break-all;
    max-width: 230px;
    line-height: 1.5;
  }

  #emptyHint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-faint);
    font-size: 0.9rem;
    letter-spacing: 0.02em;
    pointer-events: none;
  }

  #dragPill {
    position: fixed;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.85rem;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  body.is-dragging { cursor: grabbing; }
  body.is-dragging * { cursor: grabbing !important; }
  /* 拖拽进行中禁掉浏览器自身的滚动/缩放手势，否则触摸拖到一半会被打断 */
  body.is-dragging { touch-action: none; }

  /* ---------- 手机版：单列 + 底部标签页 ---------- */
  #tabBar { display: none; }
  .only-mobile { display: none; }

  @media (max-width: 760px) {
    html, body { height: 100dvh; }

    header {
      gap: 10px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
    }
    header h1 { display: none; }      /* 375px 放不下，标题让位给日期和同步状态 */
    #fsChip { display: none; }        /* iOS 不支持本地文件 API，备份入口并进云同步菜单 */
    #cloudChip { max-width: 116px; }
    .range-ctl { display: none; }          /* 显示时段在电脑上调，设置会同步过来 */
    .spacer { display: none; }
    #dateLabel {
      min-width: 0;
      flex: 1;
      font-size: 0.92rem;
      text-align: right;
    }
    #dateLabel .weekday { margin-left: 5px; }
    .date-nav button { padding: 5px 11px; }

    .v-split { display: none; }

    /* 三个面板全宽，只显示当前标签对应的那个（!important 用来盖过存下来的内联宽度） */
    #left, #right, #notesPanel {
      width: 100% !important;
      border-left: none;
      border-right: none;
      display: none;
    }
    body[data-tab="todo"]  #left,
    body[data-tab="time"]  #right,
    body[data-tab="notes"] #notesPanel { display: flex; }

    #left { overflow: hidden; }
    #right { padding: 10px 12px 12px; }
    #notesPanel { padding: 12px 14px; }

    /* 时间轴整块不滚动，直接把触摸手势交给我们自己处理 */
    #timeline { touch-action: none; --rail-w: 104px !important; }
    /* 清单里允许竖向滚动，长按才进入拖拽（见 beginDrag） */
    .todo { touch-action: pan-y; }

    .only-mobile { display: inline-flex; }

    /* 触摸目标放大一点 */
    .todo { padding-top: 8px; padding-bottom: 8px; }
    /* 触摸屏没有 hover，图标按钮必须常驻可见 */
    .icon-btn {
      opacity: 1;
      min-width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;

      color: var(--ink-soft);
    }

    #tabBar {
      display: flex;
      flex: none;
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 20;
      box-shadow: 0 -1px 2px rgba(57, 50, 33, .05);
    }
    #tabBar button {
      flex: 1;
      border: none;
      background: transparent;
      padding: 8px 0 10px;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: color .15s;
    }
    #tabBar button .ti { font-size: 1.02rem; letter-spacing: 0; line-height: 1; }
    #tabBar button[aria-selected="true"] { color: var(--accent-deep); font-weight: 700; }

    .fs-card { padding: 22px 20px; }
  }

  /* ---------- 排时间弹层（手机上代替「拖到时间轴」） ---------- */
  #cloudOverlay,
  #schedOverlay {
    position: fixed;
    inset: 0;
    background: rgba(42, 40, 32, .35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 60;
    padding: 16px;
  }
  #schedOverlay.open, #cloudOverlay.open { display: flex; }
  .sched-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 22px 22px 18px;
    width: 360px;
    max-width: 100%;
  }
  .sched-card h3 {
    font-size: 1rem;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sched-card .sub { font-size: .78rem; color: var(--ink-soft); margin-bottom: 16px; }
  .sched-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sched-row label { font-size: .8rem; color: var(--ink-soft); width: 52px; flex: none; }
  .sched-row input, .sched-row select {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    background: var(--panel);
    color: var(--ink);
    font-size: .95rem;
    outline: none;
  }
  .sched-row input:focus, .sched-row select:focus { border-color: var(--accent); }
  .sched-actions { display: flex; gap: 8px; margin-top: 18px; }
  .sched-actions button {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 9px;
    padding: 9px 10px;
    font-size: .85rem;
    color: var(--ink);
    cursor: pointer;
  }
  .sched-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .sched-actions button.unset { color: var(--danger); flex: none; padding: 9px 12px; }
  .sched-card .steps {
    font-size: .78rem;
    color: var(--ink-soft);
    line-height: 1.75;
    background: var(--bg);
    border-radius: 9px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .sched-card .steps a { color: var(--accent-deep); }
  .sched-card .steps code {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0 4px;
    font-size: .92em;
  }
  .sched-row input[type="password"], .sched-row input[type="text"] { font-family: ui-monospace, Consolas, monospace; font-size: .85rem; }
  .cloud-msg { font-size: .78rem; line-height: 1.6; margin-top: 12px; min-height: 1.2em; }
  .cloud-msg.err { color: var(--danger); }
  .cloud-msg.ok { color: var(--accent-deep); }
</style>
</head>
<body>

<header>
  <h1>一日一页</h1>
  <div class="date-nav">
    <button id="prevDay">‹</button>
    <button id="todayBtn" class="today-btn">今天</button>
    <button id="nextDay">›</button>
  </div>
  <div id="dateLabel"></div>
  <div class="spacer"></div>
  <div class="range-ctl">
    显示 <select id="dayStart"></select> — <select id="dayEnd"></select>
  </div>
  <button id="cloudChip" data-state="none">云同步</button>
  <button id="fsChip" data-state="none">数据文件</button>
  <input id="importFile" type="file" accept=".json,application/json" hidden>
</header>

<main>
  <div id="left">
    <section id="focusSection">
      <h2>★ 当前焦点（最多 3 件）</h2>
      <div id="focusList"></div>
    </section>

    <section id="inboxSection">
      <h2>待办清单</h2>
      <div id="addRow">
        <input id="addInput" type="text" placeholder="想到什么记下来，回车添加" autocomplete="off">
        <button id="addBtn" title="添加">+</button>
      </div>
      <div id="todoList"></div>
      <div class="hint">拖到时间轴安排时间，上下拖动调整顺序；双击任务名可改名；点 ★ 设为今日焦点。</div>
    </section>

    <section id="doneSection">
      <h2 id="doneHeader">✓ 已完成 <span class="count" id="doneCount">0</span>
        <button id="clearDone" title="清空已完成">清空</button>
      </h2>
      <div id="doneList"></div>
    </section>
  </div>

  <div class="v-split" id="splitLeft" title="拖动调整宽度"></div>

  <div id="right">
    <div id="remBar"></div>
    <div id="timeline">
      <div id="hourRows"></div>
      <div id="remRail"><div id="railSplit" title="拖动调整提醒栏宽度"></div></div>
      <div id="blocksArea"></div>
      <div id="remMarkers"></div>
      <div id="dropGhost"></div>
      <div id="remGhost"></div>
      <div id="editLayer"></div>
      <div id="nowLine"></div>
      <div id="emptyHint">在空白处按住往下拖，画出一段时间；也可以从左边拖任务过来</div>
    </div>
  </div>

  <div class="v-split" id="splitNotes" title="拖动调整宽度"></div>

  <div id="notesPanel">
    <h2>✎ 随手记</h2>
    <textarea id="notesArea" placeholder="想法、灵感、备忘……写在这里，自动保存。"></textarea>
    <h2 id="journalTitle" class="journal-h">✦ 今日总结</h2>
    <textarea id="journalArea" placeholder="今天过得怎么样？总结几句，只属于这一天。"></textarea>
  </div>
</main>

<nav id="tabBar">
  <button data-tab="todo" aria-selected="true"><span class="ti">☰</span>清单</button>
  <button data-tab="time"><span class="ti">◷</span>时间轴</button>
  <button data-tab="notes"><span class="ti">✎</span>随手记</button>
</nav>

<div id="blockMenu"></div>
<div id="remMenu"></div>
<div id="fsMenu"></div>

<div id="cloudOverlay">
  <div class="sched-card">
    <h3>连接云同步</h3>
    <div class="sub">数据存到你自己的一个私有 Gist，电脑和 iPhone 共用一份。</div>
    <div class="steps">
      1. 打开 <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">GitHub Token 页面</a>，生成一个 token<br>
      2. 权限只需要勾 <code>gist</code>，有效期建议选 No expiration<br>
      3. 把 token 贴到下面。第二台设备贴同一个 token 即可自动找到数据
    </div>
    <div class="sched-row">
      <label for="cloudToken">Token</label>
      <input id="cloudToken" type="password" placeholder="ghp_… 或 github_pat_…" autocomplete="off" spellcheck="false">
    </div>
    <div class="sched-row">
      <label for="cloudGistId">Gist ID</label>
      <input id="cloudGistId" type="text" placeholder="留空＝自动新建 / 自动找到" autocomplete="off" spellcheck="false">
    </div>
    <div class="cloud-msg" id="cloudMsg"></div>
    <div class="sched-actions">
      <button id="cloudCancel">关闭</button>
      <button id="cloudConnect" class="primary">连接</button>
    </div>
  </div>
